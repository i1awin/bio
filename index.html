<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lawin</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<!-- Custom CSS -->
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- GIF background as img -->
<img src="https://files.catbox.moe/0ip5qr.gif" alt="Background GIF" id="bg-gif">

<!-- Snow background -->
<div id="particles-js"></div>

<!-- Intro overlay -->
<div id="intro">
  <div class="intro-content">
    <h1>Click to Enter</h1>
  </div>
</div>

<!-- Main content hidden initially -->
<div class="container" id="main-content">

  <h1>/home/lawin</h1>

  <img class="avatar" src="https://files.catbox.moe/91b8j7.jpg" alt="Avatar">

  <div class="links">
    <a href="https://soundcloud.com/var-637518793" target="_blank"><i class="fa-brands fa-soundcloud"></i> SoundCloud</a>
    <a href="https://open.spotify.com/user/31apa4g6n2suvbgdcjsmmvc6gv3m?si=gKol8DCrQ-qGxLaf7QkFMw" target="_blank"><i class="fa-solid fa-play"></i> Playlists</a>
    <a href="https://t.me/i1awin" target="_blank"><i class="fa-brands fa-telegram"></i> Telegram</a>
  </div>

</div>

<!-- Hidden audio, preloaded -->
<audio id="bg-audio" loop preload="auto">
  <source src="YOUR_MP3_URL_HERE" type="audio/mpeg">
</audio>

<!-- Volume slider -->
<input type="range" id="volume-control" min="0" max="1" step="0.01" value="0.5">

<!-- Particles.js -->
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
particlesJS("particles-js", {
  "particles": {
    "number": { "value": 120 },
    "size": { "value": 3 },
    "move": { "speed": 0.6 },
    "opacity": { "value": 0.8 },
    "line_linked": { "enable": false }
  }
});
</script>

<!-- Intro click + smooth audio fade-in -->
<script>
const intro = document.getElementById('intro');
const mainContent = document.getElementById('main-content');
const audio = document.getElementById('bg-audio');
const volumeSlider = document.getElementById('volume-control');

intro.addEventListener('click', () => {
  // Fade out intro overlay
  intro.style.transition = 'opacity 1s ease';
  intro.style.opacity = '0';

  setTimeout(() => {
    intro.style.display = 'none';
    mainContent.style.transition = 'opacity 1s ease';
    mainContent.style.opacity = '1';

    // Start audio with fade-in
    audio.volume = 0;
    audio.play().then(() => {
      let targetVolume = volumeSlider.value;
      let vol = 0;
      const fadeIn = setInterval(() => {
        if (vol < targetVolume) {
          vol += 0.02;
          audio.volume = Math.min(vol, targetVolume);
        } else {
          clearInterval(fadeIn);
        }
      }, 50);
    }).catch(err => {
      console.log("Audio autoplay blocked:", err);
    });
  }, 1000);
});

// Volume slider control
volumeSlider.addEventListener('input', () => {
  audio.volume = volumeSlider.value;
});
</script>

</body>
</html>
